
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Local Explorer — Compact Tray Update</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(10,18,31,.86);
      --panel-2:rgba(17,28,46,.92);
      --border:rgba(255,255,255,.11);
      --text:#f4f7fd;
      --muted:#a9b6c9;
      --muted-2:#c7d2e0;
      --accent:#67b4ff;
      --shadow:0 14px 34px rgba(0,0,0,.28);
      --safe-top:max(10px, env(safe-area-inset-top));
      --safe-bottom:max(12px, env(safe-area-inset-bottom));
      --chip-h:38px;
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
    body{overflow:hidden}
    button,input{font:inherit}
    .app{position:relative;height:100%;width:100%;overflow:hidden;background:#091322}
    #map{position:absolute;inset:0;z-index:1;background:#0e1626}

    .glass{
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background:linear-gradient(180deg, rgba(18,29,48,.86), rgba(10,17,29,.84));
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .scrim{
      position:absolute; inset:0; z-index:19;
      background:rgba(5,8,15,.18);
      opacity:0; pointer-events:none;
      transition:opacity .2s ease;
    }
    .scrim.show{opacity:1; pointer-events:auto}

    .top-ui{
      position:absolute;
      top:var(--safe-top);
      left:10px; right:10px;
      z-index:20;
      display:flex; flex-direction:column; gap:8px;
      pointer-events:none;
    }

    .top-row{
      display:flex; align-items:center; gap:8px;
      pointer-events:auto;
    }

    .search-shell{
      min-width:0;
      flex:1;
      height:46px;
      border-radius:999px;
      display:flex; align-items:center; gap:10px;
      padding:0 14px;
      color:var(--text);
    }
    .search-icon{
      font-size:15px;
      opacity:.9;
    }
    .search-copy{
      min-width:0;
      display:flex; align-items:center; gap:8px;
      overflow:hidden;
    }
    .search-title{
      font-size:16px;
      font-weight:780;
      letter-spacing:-.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .search-sub{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.12em;
      white-space:nowrap;
      display:none;
    }

    .icon-btn{
      height:46px; min-width:46px;
      border-radius:999px;
      padding:0 13px;
      color:var(--text);
      display:inline-flex; align-items:center; justify-content:center;
      gap:7px;
      cursor:pointer;
      pointer-events:auto;
    }
    .icon-btn .emoji{font-size:17px}
    .icon-btn .label{font-weight:760;font-size:14px}
    .icon-btn:active, .chip:active, .sheet-button:active, .search-area-btn:active, .result-bar:active, .mini-btn:active{
      transform:translateY(1px);
    }

    .chip-rail-wrap{
      pointer-events:auto;
      display:flex;
      align-items:center;
      min-width:0;
    }
    .chip-rail{
      width:100%;
      display:flex;
      gap:8px;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      padding:2px 0;
      scroll-snap-type:x proximity;
    }
    .chip-rail::-webkit-scrollbar{display:none}

    .chip{
      height:var(--chip-h);
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      background:linear-gradient(180deg, rgba(20,31,49,.88), rgba(11,20,33,.86));
      padding:0 14px;
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:760;
      font-size:14px;
      white-space:nowrap;
      flex:0 0 auto;
      scroll-snap-align:start;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.2);
    }
    .chip.active{
      border-color:rgba(126,193,255,.62);
      background:linear-gradient(180deg, rgba(58,121,184,.96), rgba(35,79,131,.96));
      box-shadow:0 10px 22px rgba(53,120,188,.28);
    }
    .chip.ghost{
      color:var(--muted-2);
    }

    .search-area-btn{
      position:absolute;
      top:calc(var(--safe-top) + 96px);
      left:50%;
      transform:translateX(-50%);
      z-index:21;
      border-radius:999px;
      padding:10px 14px;
      color:var(--text);
      font-size:14px;
      font-weight:800;
      letter-spacing:-.01em;
      display:none;
      cursor:pointer;
      white-space:nowrap;
    }
    .search-area-btn.show{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .sheet{
      position:absolute;
      left:10px; right:10px;
      bottom:calc(var(--safe-bottom) + 84px);
      z-index:24;
      border-radius:22px;
      padding:14px 14px 14px;
      display:none;
    }
    .sheet.show{display:block}
    .sheet-handle{
      width:38px;height:5px;border-radius:999px;background:rgba(255,255,255,.16);
      margin:0 auto 12px;
    }
    .sheet-header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;
    }
    .sheet-title{font-size:19px;font-weight:850;letter-spacing:-.03em}
    .sheet-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.35}
    .close-btn{
      width:40px;height:40px;border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;
      flex:0 0 auto;
    }
    .category-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .sheet-button{
      border-radius:16px;
      border:1px solid rgba(255,255,255,.1);
      background:linear-gradient(180deg, rgba(21,34,56,.95), rgba(12,22,37,.93));
      padding:13px 13px;
      color:var(--text);
      text-align:left;
      cursor:pointer;
      min-height:80px;
    }
    .sheet-button.active{
      border-color:rgba(126,193,255,.62);
      box-shadow:0 12px 30px rgba(53,120,188,.22);
    }
    .sheet-button .name{font-size:15px;font-weight:800;letter-spacing:-.01em}
    .sheet-button .desc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}

    .list-sheet{
      position:absolute;
      left:10px; right:10px; bottom:calc(var(--safe-bottom) + 8px);
      z-index:22;
      border-radius:22px 22px 18px 18px;
      overflow:hidden;
      transition:transform .22s ease, height .22s ease;
    }
    .result-bar{
      background:transparent;
      border:none;
      box-shadow:none;
      width:100%;
      display:flex; align-items:center; justify-content:space-between;
      padding:15px 16px;
      cursor:pointer;
      color:var(--text);
    }
    .result-copy{min-width:0}
    .result-title{font-size:16px;font-weight:840;letter-spacing:-.02em}
    .result-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .chev{
      font-size:18px;
      color:var(--muted-2);
      transition:transform .2s ease;
      margin-left:10px;
    }
    .list-sheet.expanded .chev{transform:rotate(180deg)}

    .results-panel{
      border-top:1px solid rgba(255,255,255,.08);
      max-height:0;
      overflow:hidden;
      transition:max-height .24s ease;
    }
    .list-sheet.expanded .results-panel{
      max-height:46vh;
      overflow:auto;
    }
    .results-list{
      padding:10px 12px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .result-card{
      border:1px solid rgba(255,255,255,.09);
      background:linear-gradient(180deg, rgba(20,31,50,.92), rgba(12,21,36,.9));
      border-radius:16px;
      padding:13px;
    }
    .result-name{
      font-size:15px;
      font-weight:800;
      letter-spacing:-.01em;
      margin-bottom:6px;
    }
    .result-meta{
      font-size:12.5px;
      color:var(--muted);
      line-height:1.45;
    }
    .result-actions{
      display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;
    }
    .mini-btn{
      border-radius:999px;
      border:1px solid rgba(255,255,255,.11);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .empty-state{
      position:absolute;
      left:12px; right:12px;
      bottom:calc(var(--safe-bottom) + 92px);
      z-index:18;
      border-radius:18px;
      padding:12px 14px;
      display:none;
      color:var(--muted-2);
      font-size:13px;
      line-height:1.4;
    }
    .empty-state.show{display:block}

    .leaflet-control-container .leaflet-top,
    .leaflet-control-container .leaflet-bottom{z-index:2}
    .leaflet-control-attribution{
      background:rgba(8,14,24,.72)!important;
      color:#b6c4d9!important;
      border-radius:10px 0 0 0;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:none!important;
      font-size:10px!important;
      padding:3px 6px!important;
    }
    .leaflet-control-attribution a{color:#d8e6ff!important}
    .leaflet-popup-content-wrapper, .leaflet-popup-tip{
      background:#0f1a2d;
      color:#eef5ff;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 40px rgba(0,0,0,.35);
    }
    .leaflet-popup-content{margin:14px 16px 14px 14px;line-height:1.45}
    .popup-name{font-weight:850;font-size:15px;margin-bottom:6px;color:#f6fbff}
    .popup-meta{font-size:12px;color:#c3d3e8}

    @media (min-width: 768px){
      .top-ui{left:18px; right:18px; max-width:760px; margin:0 auto}
      .sheet{max-width:720px; margin:0 auto}
      .list-sheet{left:50%; right:auto; width:min(640px, calc(100% - 20px)); transform:translateX(-50%)}
      .empty-state{left:50%; right:auto; width:min(520px, calc(100% - 24px)); transform:translateX(-50%)}
      .search-area-btn{top:calc(var(--safe-top) + 90px)}
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="map" aria-label="Map"></div>
    <div class="scrim" id="scrim"></div>

    <div class="top-ui">
      <div class="top-row">
        <div class="search-shell glass" aria-label="Nearby places">
          <span class="search-icon">⌕</span>
          <div class="search-copy">
            <div class="search-title">Nearby spots</div>
            <div class="search-sub">Local Explorer</div>
          </div>
        </div>
        <button class="icon-btn glass" id="locateBtn" aria-label="Go to my location">
          <span class="emoji">📍</span>
          <span class="label">Me</span>
        </button>
      </div>

      <div class="chip-rail-wrap">
        <div class="chip-rail" id="chipRail" aria-label="Quick categories"></div>
      </div>
    </div>

    <button class="search-area-btn glass" id="searchAreaBtn" aria-live="polite">
      <span>Search this area</span>
    </button>

    <div class="sheet glass" id="moreSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="sheet-title">More places</div>
          <div class="sheet-sub">Choose a category without giving up the map.</div>
        </div>
        <button class="close-btn" id="closeSheetBtn" aria-label="Close categories">✕</button>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div class="empty-state glass show" id="emptyState">
      Pick a category to drop nearby places onto the map.
    </div>

    <div class="list-sheet glass" id="listSheet">
      <button class="result-bar" id="resultBar" aria-expanded="false">
        <div class="result-copy">
          <div class="result-title" id="resultTitle">No category selected</div>
          <div class="result-sub" id="resultSub">List stays tucked away until you open it.</div>
        </div>
        <div class="chev">⌃</div>
      </button>
      <div class="results-panel">
        <div class="results-list" id="resultsList"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const categories = [
      { id: "park", label: "Parks", desc: "Parks and green spaces", tags: ["leisure=park", "landuse=recreation_ground"] },
      { id: "coffee", label: "Coffee", desc: "Cafes and coffee shops", tags: ["amenity=cafe", "shop=coffee"] },
      { id: "restaurant", label: "Restaurants", desc: "Sit-down food nearby", tags: ["amenity=restaurant"] },
      { id: "pharmacy", label: "Drug stores", desc: "Pharmacies and drug stores", tags: ["amenity=pharmacy"] },
      { id: "bakery", label: "Bakeries", desc: "Bread, pastries, sweets", tags: ["shop=bakery"] },
      { id: "grocery", label: "Groceries", desc: "Markets and grocery stores", tags: ["shop=supermarket", "shop=convenience", "shop=grocery"] },
      { id: "playground", label: "Playgrounds", desc: "Play areas and kid spots", tags: ["leisure=playground"] },
      { id: "gym", label: "Gyms", desc: "Fitness and training", tags: ["leisure=fitness_centre", "sport=fitness"] }
    ];

    const quickCategoryIds = ["park", "coffee", "restaurant", "pharmacy"];
    const defaultCenter = [40.876, -73.910];
    const defaultZoom = 14;

    const chipRail = document.getElementById("chipRail");
    const categoryGrid = document.getElementById("categoryGrid");
    const moreSheet = document.getElementById("moreSheet");
    const closeSheetBtn = document.getElementById("closeSheetBtn");
    const scrim = document.getElementById("scrim");
    const searchAreaBtn = document.getElementById("searchAreaBtn");
    const listSheet = document.getElementById("listSheet");
    const resultBar = document.getElementById("resultBar");
    const resultTitle = document.getElementById("resultTitle");
    const resultSub = document.getElementById("resultSub");
    const resultsList = document.getElementById("resultsList");
    const emptyState = document.getElementById("emptyState");
    const locateBtn = document.getElementById("locateBtn");

    let selectedCategory = null;
    let userMarker = null;
    let userLatLng = null;
    let isResultsExpanded = false;
    let suppressMoveNotice = true;
    let activeFetchController = null;

    const map = L.map("map", {
      zoomControl: false,
      preferCanvas: true
    }).setView(defaultCenter, defaultZoom);

    L.control.zoom({ position: "bottomright" }).addTo(map);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const resultLayer = L.layerGroup().addTo(map);

    function createChip(label, id, extraClass = "") {
      const btn = document.createElement("button");
      btn.className = `chip ${extraClass}`.trim();
      btn.textContent = label;
      btn.dataset.id = id;
      return btn;
    }

    function renderChips() {
      chipRail.innerHTML = "";
      quickCategoryIds.forEach(id => {
        const cat = categories.find(c => c.id === id);
        if (!cat) return;
        const chip = createChip(cat.label, cat.id);
        chip.addEventListener("click", () => {
          setSelectedCategory(cat.id, true);
          closeMoreSheet();
        });
        chipRail.appendChild(chip);
      });

      const moreChip = createChip("More", "more", "ghost");
      moreChip.addEventListener("click", openMoreSheet);
      chipRail.appendChild(moreChip);
      updateSelectionUI();
    }

    function renderMoreSheet() {
      categoryGrid.innerHTML = "";
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "sheet-button";
        btn.dataset.id = cat.id;
        btn.innerHTML = `
          <div class="name">${cat.label}</div>
          <div class="desc">${cat.desc}</div>
        `;
        btn.addEventListener("click", () => {
          setSelectedCategory(cat.id, true);
          closeMoreSheet();
        });
        categoryGrid.appendChild(btn);
      });
      updateSelectionUI();
    }

    function updateSelectionUI() {
      document.querySelectorAll(".chip").forEach(el => {
        el.classList.toggle("active", el.dataset.id === selectedCategory);
      });
      document.querySelectorAll(".sheet-button").forEach(el => {
        el.classList.toggle("active", el.dataset.id === selectedCategory);
      });
    }

    function openMoreSheet() {
      moreSheet.classList.add("show");
      moreSheet.setAttribute("aria-hidden", "false");
      scrim.classList.add("show");
    }

    function closeMoreSheet() {
      moreSheet.classList.remove("show");
      moreSheet.setAttribute("aria-hidden", "true");
      scrim.classList.remove("show");
    }

    closeSheetBtn.addEventListener("click", closeMoreSheet);
    scrim.addEventListener("click", closeMoreSheet);

    function formatDistanceMeters(meters) {
      if (meters == null || Number.isNaN(meters)) return "";
      if (meters < 1000) return `${Math.round(meters)} m away`;
      const km = meters / 1000;
      return `${km.toFixed(km < 10 ? 1 : 0)} km away`;
    }

    function getDistanceMeters(a, b) {
      const R = 6371000;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }

    function titleCase(value) {
      return (value || "")
        .split(/[_\s]+/)
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function getCategoryById(id) {
      return categories.find(c => c.id === id) || null;
    }

    function setSelectedCategory(categoryId, runSearch = false) {
      selectedCategory = categoryId;
      updateSelectionUI();
      const category = getCategoryById(selectedCategory);
      emptyState.classList.remove("show");
      resultTitle.textContent = category ? `${category.label} nearby` : "No category selected";
      resultSub.textContent = category
        ? "Results in current map area"
        : "List stays tucked away until you open it.";
      if (runSearch && category) {
        fetchPlacesForVisibleArea(category);
      }
    }

    function setSearchAreaVisible(show) {
      searchAreaBtn.classList.toggle("show", show);
    }

    function setResultsExpanded(expanded) {
      isResultsExpanded = expanded;
      listSheet.classList.toggle("expanded", expanded);
      resultBar.setAttribute("aria-expanded", String(expanded));
    }

    resultBar.addEventListener("click", () => {
      if (!selectedCategory) return;
      setResultsExpanded(!isResultsExpanded);
    });

    function makePopupHtml(place) {
      const lines = [];
      if (place.typeLabel) lines.push(place.typeLabel);
      if (place.distanceText) lines.push(place.distanceText);
      return `
        <div class="popup-name">${place.name || "Unnamed place"}</div>
        <div class="popup-meta">${lines.join(" · ") || "Nearby place"}</div>
      `;
    }

    function updateResultCards(places) {
      resultsList.innerHTML = "";
      if (!places.length) {
        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `
          <div class="result-name">No results found</div>
          <div class="result-meta">Try searching this area again or move the map slightly.</div>
        `;
        resultsList.appendChild(card);
        return;
      }

      places.forEach(place => {
        const card = document.createElement("div");
        card.className = "result-card";
        const typeBits = [place.typeLabel, place.distanceText].filter(Boolean).join(" · ");
        card.innerHTML = `
          <div class="result-name">${escapeHtml(place.name || "Unnamed place")}</div>
