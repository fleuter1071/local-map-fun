<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GPS Map MVP</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #0c1322;
      --panel: rgba(12, 20, 35, 0.82);
      --panel-border: rgba(255,255,255,0.10);
      --text: #edf3ff;
      --muted: #98a9ca;
      --accent: #63d0ff;
      --danger: #ff8b8b;
      --shadow: 0 18px 48px rgba(0,0,0,0.34);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #app, #map {
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand,
    .locate,
    .sheet,
    .details-toggle {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
    }

    .brand {
      pointer-events: auto;
      padding: 12px 14px;
      border-radius: 18px;
      min-width: 0;
      max-width: 72%;
    }

    .brand h1 {
      font-size: 15px;
      line-height: 1.2;
      margin: 0 0 3px;
      letter-spacing: 0.01em;
    }

    .brand p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .locate {
      pointer-events: auto;
      border: 0;
      color: var(--text);
      width: 54px;
      height: 54px;
      border-radius: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .locate:active,
    .details-toggle:active,
    .sheet-toggle:active { transform: scale(0.98); }

    .locate svg,
    .sheet-toggle svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .sheet {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 1000;
      border-radius: var(--radius);
      padding: 16px;
      transition: opacity 180ms ease, transform 220ms ease;
    }

    .sheet.hidden {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
    }

    .sheet-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .sheet-toggle {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(99, 208, 255, 0.85);
      flex: 0 0 auto;
    }

    .dot.error {
      background: var(--danger);
      box-shadow: 0 0 16px rgba(255, 139, 139, 0.85);
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .pill {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.07);
      min-width: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .value {
      display: block;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .details-toggle {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 1000;
      border-radius: 18px;
      padding: 12px 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
      cursor: pointer;
    }

    .details-toggle.visible {
      display: flex;
    }

    .details-toggle .left {
      min-width: 0;
    }

    .details-toggle .mini {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .details-toggle strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .details-toggle .chev {
      font-size: 18px;
      line-height: 1;
      color: var(--muted);
    }

    .user-marker {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #c8f3ff 26%, #63d0ff 58%, #2577ff 100%);
      border: 2px solid rgba(255,255,255,0.98);
      box-shadow: 0 0 0 10px rgba(99, 208, 255, 0.18), 0 0 22px rgba(99, 208, 255, 0.55);
    }

    .leaflet-control-zoom { display: none; }
    .leaflet-control-attribution {
      font-size: 10px;
      background: rgba(255,255,255,0.84);
    }

    @media (min-width: 760px) {
      .sheet, .details-toggle {
        max-width: 460px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map" aria-label="Map showing your location"></div>

    <div class="topbar">
      <div class="brand">
        <h1>GPS Map MVP</h1>
        <p>Your location + nearby surroundings</p>
      </div>

      <button id="locateBtn" class="locate" aria-label="Locate me" title="Locate me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>
    </div>

    <section id="detailsSheet" class="sheet" aria-live="polite">
      <div class="sheet-topline">
        <div class="sheet-head">
          <div>
            <div class="eyebrow"><span id="statusDot" class="dot"></span><span id="statusText">Locating</span></div>
            <h2 id="titleText" class="title">Getting your current position</h2>
            <p id="subText" class="sub">Allow location access when your browser asks.</p>
          </div>
          <div id="timePill" class="pill">Waiting…</div>
        </div>
        <button id="hideSheetBtn" class="sheet-toggle" aria-label="Hide details" title="Hide details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 15l6-6 6 6"></path>
          </svg>
        </button>
      </div>

      <div class="grid">
        <div class="card">
          <span class="label">Coordinates</span>
          <span id="coordsValue" class="value">—</span>
        </div>
        <div class="card">
          <span class="label">Accuracy</span>
          <span id="accuracyValue" class="value">—</span>
        </div>
      </div>

      <p id="noteText" class="note">Tip: GPS usually works best when this file is hosted over HTTPS or localhost rather than opened directly as a phone file.</p>
    </section>

    <button id="showDetailsBtn" class="details-toggle" aria-label="Show details">
      <div class="left">
        <strong>Show details</strong>
        <p class="mini">Bring back the location panel</p>
      </div>
      <span class="chev">⌃</span>
    </button>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([40.7128, -74.0060], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const locateBtn = document.getElementById('locateBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const titleText = document.getElementById('titleText');
    const subText = document.getElementById('subText');
    const timePill = document.getElementById('timePill');
    const coordsValue = document.getElementById('coordsValue');
    const accuracyValue = document.getElementById('accuracyValue');
    const noteText = document.getElementById('noteText');
    const detailsSheet = document.getElementById('detailsSheet');
    const hideSheetBtn = document.getElementById('hideSheetBtn');
    const showDetailsBtn = document.getElementById('showDetailsBtn');

    let marker = null;
    let circle = null;

    function hideDetails() {
      detailsSheet.classList.add('hidden');
      showDetailsBtn.classList.add('visible');
    }

    function showDetails() {
      detailsSheet.classList.remove('hidden');
      showDetailsBtn.classList.remove('visible');
    }

    function setLoading() {
      statusDot.classList.remove('error');
      statusText.textContent = 'Locating';
      titleText.textContent = 'Getting your current position';
      subText.textContent = 'Allow location access when your browser asks.';
      timePill.textContent = 'Waiting…';
    }

    function setError(message) {
      statusDot.classList.add('error');
      statusText.textContent = 'Error';
      titleText.textContent = message;
      subText.textContent = 'Try the locate button again after changing permissions or signal.';
      timePill.textContent = 'No fix';
      noteText.textContent = 'If opened directly from a phone file system, GPS may be blocked. Hosting over HTTPS usually fixes that.';
      showDetails();
    }

    function updateTime() {
      timePill.textContent = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function formatAccuracy(meters) {
      if (!Number.isFinite(meters)) return '—';
      const feet = meters * 3.28084;
      if (feet < 1000) return `${Math.round(feet)} ft`;
      return `${Math.round(meters)} m`;
    }

    function onSuccess(position) {
      const { latitude, longitude, accuracy } = position.coords;
      const latlng = [latitude, longitude];

      if (!marker) {
        const icon = L.divIcon({ className: '', html: '<div class="user-marker"></div>', iconSize: [22, 22], iconAnchor: [11, 11] });
        marker = L.marker(latlng, { icon }).addTo(map);
      } else {
        marker.setLatLng(latlng);
      }

      if (!circle) {
        circle = L.circle(latlng, {
          radius: accuracy,
          color: '#63d0ff',
          weight: 2,
          opacity: 0.9,
          fillColor: '#63d0ff',
          fillOpacity: 0.14
        }).addTo(map);
      } else {
        circle.setLatLng(latlng);
        circle.setRadius(accuracy);
      }

      map.setView(latlng, accuracy < 100 ? 17 : 16, { animate: true });

      statusDot.classList.remove('error');
      statusText.textContent = 'Located';
      titleText.textContent = 'You are here';
      subText.textContent = 'The map is centered on your current device position.';
      updateTime();
      coordsValue.textContent = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
      accuracyValue.textContent = formatAccuracy(accuracy);
      noteText.textContent = 'The blue circle shows the approximate GPS accuracy radius around your location.';
    }

    function onError(error) {
      const messages = {
        1: 'Permission denied for location',
        2: 'Position unavailable right now',
        3: 'Location request timed out'
      };
      setError(messages[error.code] || 'Unable to get your location');
    }

    function locate() {
      setLoading();
      if (!('geolocation' in navigator)) {
        setError('Geolocation is not supported in this browser');
        return;
      }
      navigator.geolocation.getCurrentPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      });
    }

    locateBtn.addEventListener('click', locate);
    hideSheetBtn.addEventListener('click', hideDetails);
    showDetailsBtn.addEventListener('click', showDetails);

    locate();
  </script>
</body>
</html>
