<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Local Explorer — Compact Chip Update</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(10,18,31,.84);
      --border: rgba(255,255,255,.11);
      --text: #f4f7fd;
      --muted: #a9b6c9;
      --muted-2: #cbd6e5;
      --shadow: 0 14px 34px rgba(0,0,0,.28);
      --safe-top: max(10px, env(safe-area-inset-top));
      --safe-bottom: max(12px, env(safe-area-inset-bottom));
      --header-h: 42px;
      --chip-h: 38px;
      --chip-font: 13px;
      --chip-gap: 6px;
    }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; background:var(--bg); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); }
    body { overflow:hidden; }
    button,input { font:inherit; }
    .app { position:relative; height:100%; width:100%; overflow:hidden; background:#091322; }
    #map { position:absolute; inset:0; z-index:1; background:#0e1626; }
    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: linear-gradient(180deg, rgba(18,29,48,.82), rgba(10,17,29,.8));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .scrim { position:absolute; inset:0; z-index:19; background:rgba(5,8,15,.18); opacity:0; pointer-events:none; transition:opacity .2s ease; }
    .scrim.show { opacity:1; pointer-events:auto; }
    .top-ui {
      position:absolute; top:calc(var(--safe-top) - 2px); left:10px; right:10px; z-index:20;
      display:flex; flex-direction:column; gap:6px; pointer-events:none;
    }
    .top-row { display:flex; align-items:center; justify-content:flex-end; gap:8px; pointer-events:auto; min-height:40px; }
    .tray-label {
      min-width:0; flex:1; height:var(--header-h); border-radius:999px;
      display:flex; align-items:center; gap:10px; padding:0 14px; color:var(--text);
    }
    .tray-icon { font-size:15px; opacity:.9; line-height:1; }
    .tray-copy { min-width:0; display:flex; align-items:baseline; gap:8px; overflow:hidden; }
    .tray-title {
      font-size:15px; font-weight:740; letter-spacing:-.02em;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .tray-sub { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; white-space:nowrap; display:none; }
    .icon-btn {
      height:40px; min-width:40px; border-radius:999px; padding:0 10px;
      color:var(--text); display:inline-flex; align-items:center; justify-content:center; gap:6px;
      cursor:pointer; pointer-events:auto; border:1px solid rgba(255,255,255,.09);
      background: rgba(18,29,48,.78);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }
    .icon-btn .emoji { font-size:16px; }
    .icon-btn .label { font-weight:700; font-size:13px; }
    .locate-only {
      width: var(--header-h);
      min-width: var(--header-h);
      padding: 0;
    }
    .locate-glyph {
      position: relative;
      width: 18px;
      height: 18px;
      display: inline-block;
    }
    .locate-glyph::before {
      content: "";
      position: absolute;
      inset: 1px;
      border: 2px solid rgba(244,247,253,.92);
      border-radius: 50%;
      opacity: .95;
    }
    .locate-glyph::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      margin-left: -2px;
      margin-top: -2px;
      border-radius: 50%;
      background: rgba(244,247,253,.98);
      box-shadow:
        0 -8px 0 -1px rgba(244,247,253,.92),
        0 8px 0 -1px rgba(244,247,253,.92),
        8px 0 0 -1px rgba(244,247,253,.92),
        -8px 0 0 -1px rgba(244,247,253,.92);
    }
    .icon-btn:active, .chip:active, .sheet-button:active, .search-area-btn:active, .result-bar:active, .mini-btn:active { transform:translateY(1px); }
    .chip-rail-wrap {
      pointer-events:auto;
      display:flex;
      align-items:center;
      min-width:0;
      overflow:visible;
      padding:0 12px;
    }
    .chip-rail {
      width:100%;
      min-width:100%;
      display:flex;
      align-items:center;
      gap:var(--chip-gap);
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      scroll-snap-type:x proximity;
      -webkit-overflow-scrolling:touch;
      padding:2px 20px 2px 0;
    }
    .chip-rail::after {
      content:"";
      flex:0 0 22px;
    }
    .chip-rail::-webkit-scrollbar { display:none; }
    .chip {
      height:var(--chip-h); padding:0 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(18,29,48,.76);
      color:var(--text); font-size:var(--chip-font); font-weight:650;
      letter-spacing:-.01em; white-space:nowrap; box-shadow: 0 8px 18px rgba(0,0,0,.16);
      display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
      flex:0 0 auto;
      scroll-snap-align:start;
    }
    .chip.active {
      background: rgba(40,94,180,.9);
      border-color: rgba(255,255,255,.16);
      box-shadow: 0 10px 22px rgba(17,44,92,.26);
    }
    .chip.ghost { color:var(--muted-2); padding-inline:14px; }
    .search-area-btn {
      position:absolute; left:50%; top:calc(var(--safe-top) + 92px); transform:translateX(-50%); z-index:20;
      height:40px; padding:0 16px; border-radius:999px; border:1px solid rgba(145,188,255,.18);
      background: linear-gradient(180deg, rgba(22,39,66,.94), rgba(12,22,37,.92));
      color:var(--text);
      box-shadow:0 12px 28px rgba(0,0,0,.24), 0 2px 0 rgba(255,255,255,.03) inset;
      font-size:13px; font-weight:780; letter-spacing:-.01em;
      display:none; align-items:center; justify-content:center; gap:8px;
      max-width:calc(100vw - 28px);
      white-space:nowrap;
      pointer-events:auto;
    }
    .search-area-btn.show { display:inline-flex; }
    .search-area-icon {
      width:16px; height:16px; display:inline-block; position:relative; flex:0 0 auto; opacity:.95;
    }
    .search-area-icon::before {
      content:""; position:absolute; inset:2px; border:2px solid rgba(244,247,253,.92); border-radius:50%;
    }
    .search-area-icon::after {
      content:""; position:absolute; width:7px; height:2px; border-radius:999px;
      background:rgba(244,247,253,.92); right:-1px; bottom:1px; transform:rotate(45deg); transform-origin:center;
    }
    .sheet {
      position:absolute; left:10px; right:10px; bottom:calc(var(--safe-bottom) + 84px); z-index:24;
      border-radius:22px; padding:14px; display:none;
    }
    .sheet.show { display:block; }
    .sheet-handle { width:38px; height:5px; border-radius:999px; background:rgba(255,255,255,.16); margin:0 auto 12px; }
    .sheet-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .sheet-title { font-size:18px; font-weight:820; letter-spacing:-.03em; }
    .sheet-sub { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.35; }
    .close-btn {
      width:38px; height:38px; border-radius:14px; border:1px solid var(--border);
      background:rgba(255,255,255,.03); color:var(--text); cursor:pointer; flex:0 0 auto;
    }
    .category-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .sheet-button {
      border-radius:16px; border:1px solid rgba(255,255,255,.1);
      background: linear-gradient(180deg, rgba(21,34,56,.95), rgba(12,22,37,.93));
      padding:13px; color:var(--text); text-align:left; cursor:pointer; min-height:78px;
    }
    .sheet-button.active { border-color:rgba(126,193,255,.62); box-shadow:0 12px 30px rgba(53,120,188,.22); }
    .sheet-button .name { font-size:15px; font-weight:780; letter-spacing:-.01em; }
    .sheet-button .desc { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.35; }
    .list-sheet {
      position:absolute; left:10px; right:10px; bottom:calc(var(--safe-bottom) + 10px); z-index:21;
      border-radius:20px; overflow:hidden;
    }
    .result-bar {
      width:100%; border:0; color:var(--text); background:transparent; text-align:left;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:13px 16px 12px; cursor:pointer;
    }
    .result-copy { min-width:0; }
    .result-title {
      font-size:16px; font-weight:760; line-height:1.15; letter-spacing:-.02em;
    }
    .result-sub {
      margin-top:4px; font-size:12px; color:var(--muted-2); line-height:1.25;
    }
    .chev { font-size:18px; color:var(--muted-2); transition:transform .2s ease; margin-left:10px; }
    .list-sheet.expanded .chev { transform:rotate(180deg); }
    .results-panel { border-top:1px solid rgba(255,255,255,.08); max-height:0; overflow:hidden; transition:max-height .24s ease; }
    .results-panel[hidden] { display:none !important; }
    .list-sheet.expanded .results-panel { max-height:46vh; overflow:auto; }
    .results-list {
      display:flex;
      flex-direction:column;
      padding:12px 12px 14px;
      gap:10px;
    }
    .result-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      padding:20px 18px 18px;
      border-radius:24px;
      text-align:left;
      color:inherit;
      background: linear-gradient(180deg, rgba(7,24,52,.92), rgba(5,18,40,.96));
      border:1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 10px 24px rgba(0,0,0,.18);
      transition: background .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease;
      appearance:none;
      -webkit-appearance:none;
      cursor:pointer;
    }
    .result-row:hover,
    .result-row:focus-visible {
      background: linear-gradient(180deg, rgba(10,30,62,.94), rgba(7,22,48,.97));
      border-color: rgba(255,255,255,.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 14px 28px rgba(0,0,0,.22);
      outline: none;
    }
    .result-row:active {
      transform: translateY(1px);
    }
    .result-main {
      min-width:0;
      flex:1;
    }
    .result-name {
      margin:0;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.03em;
      line-height:1.12;
      color:var(--text);
      white-space:normal;
      overflow-wrap:anywhere;
    }
    .result-meta {
      margin-top:8px;
      font-size:13px;
      color:var(--muted-2);
      line-height:1.28;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .result-affordance {
      flex:0 0 auto;
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.035);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(244,247,253,.9);
      font-size:18px;
      line-height:1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }
    .mini-btn {
      border-radius:999px; border:1px solid rgba(255,255,255,.11); background:rgba(255,255,255,.04);
      color:var(--text); padding:7px 11px; font-size:11.5px; font-weight:700; cursor:pointer;
    }
    .empty-state {
      position:absolute; left:12px; right:12px; bottom:calc(var(--safe-bottom) + 92px); z-index:18;
      border-radius:18px; padding:12px 14px; display:none; color:var(--muted-2); font-size:13px; line-height:1.4;
    }
    .empty-state.show { display:block; }
    .leaflet-control-container .leaflet-top, .leaflet-control-container .leaflet-bottom { z-index:2; }
    .leaflet-control-attribution {
      background:rgba(8,14,24,.72)!important; color:#b6c4d9!important; border-radius:10px 0 0 0;
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:none!important; font-size:10px!important; padding:3px 6px!important;
    }
    .leaflet-control-attribution a { color:#d8e6ff!important; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background:#0f1a2d; color:#eef5ff; border:1px solid rgba(255,255,255,.08); box-shadow:0 16px 40px rgba(0,0,0,.35);
    }
    .leaflet-popup-content { margin:14px 16px 14px 14px; line-height:1.45; }

    .place-detail-sheet {
      position:absolute;
      left:10px;
      right:10px;
      bottom:calc(var(--safe-bottom) + 94px);
      z-index:22;
      border-radius:22px;
      padding:12px 14px 14px;
      opacity:0;
      pointer-events:none;
      transform:translateY(12px);
      transition:opacity .22s ease, transform .22s ease;
    }
    .place-detail-sheet.show {
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }
    .detail-sheet-top {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .detail-sheet-copy { min-width:0; flex:1; }
    .detail-eyebrow {
      font-size:11px;
      font-weight:760;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:7px;
    }
    .detail-title {
      font-size:20px;
      font-weight:820;
      line-height:1.08;
      letter-spacing:-.03em;
      color:var(--text);
      overflow-wrap:anywhere;
    }
    .detail-sub {
      margin-top:8px;
      font-size:13px;
      line-height:1.32;
      color:var(--muted-2);
    }
    .detail-close {
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      color:var(--text);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      flex:0 0 auto;
      cursor:pointer;
    }
    .detail-close:active { transform:translateY(1px); }
    .detail-pill-row {
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .detail-pill {
      display:inline-flex;
      align-items:center;
      min-height:31px;
      padding:0 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:12px;
      font-weight:690;
      letter-spacing:-.01em;
    }
    .detail-list {
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .detail-item {
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:0;
    }
    .detail-icon {
      width:22px;
      height:22px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.055);
      color:rgba(244,247,253,.92);
      font-size:12px;
      flex:0 0 auto;
      margin-top:1px;
    }
    .detail-text {
      min-width:0;
      font-size:13px;
      line-height:1.38;
      color:var(--text);
      overflow-wrap:anywhere;
    }
    .detail-text a {
      color:#d7ecff;
      text-decoration:none;
      border-bottom:1px solid rgba(215,236,255,.35);
    }
    .detail-text a:active { opacity:.86; }
    .popup-name { font-weight:820; font-size:15px; margin-bottom:6px; color:#f6fbff; }
    .popup-meta { font-size:12px; color:#c3d3e8; }
    @media (min-width:768px) {
      :root { --header-h:44px; --chip-h:41px; }
      .top-ui { left:18px; right:18px; max-width:760px; margin:0 auto; }
      .tray-sub { display:inline; }
      .sheet { max-width:720px; margin:0 auto; }
      .list-sheet { left:50%; right:auto; width:min(640px, calc(100% - 20px)); transform:translateX(-50%); }
      .place-detail-sheet { left:50%; right:auto; width:min(640px, calc(100% - 20px)); transform:translateX(-50%) translateY(12px); }
      .place-detail-sheet.show { transform:translateX(-50%) translateY(0); }
      .empty-state { left:50%; right:auto; width:min(520px, calc(100% - 24px)); transform:translateX(-50%); }
      .search-area-btn { top:calc(var(--safe-top) + 90px); }
    }


</style>
</head>
<body>
  <div class="app">
    <div id="map" aria-label="Map"></div>
    <div class="scrim" id="scrim"></div>
    <div class="top-ui">
      <div class="top-row">
        <button class="icon-btn locate-only" id="locateBtn" aria-label="Go to my location" title="Go to my location">
          <span class="locate-glyph" aria-hidden="true"></span>
        </button>
      </div>
      <div class="chip-rail-wrap">
        <div class="chip-rail" id="chipRail" aria-label="Quick categories"></div>
      </div>
    </div>
    <button class="search-area-btn" id="searchAreaBtn" aria-live="polite"><span class="search-area-icon" aria-hidden="true"></span><span>Search this area</span></button>
    <div class="sheet glass" id="moreSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="sheet-title">More places</div>
          <div class="sheet-sub">Choose a category without giving up the map.</div>
        </div>
        <button class="close-btn" id="closeSheetBtn" aria-label="Close categories">✕</button>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div class="place-detail-sheet glass" id="placeDetailSheet" aria-hidden="true">
      <div class="detail-sheet-top">
        <div class="detail-sheet-copy">
          <div class="detail-eyebrow">Place details</div>
          <div class="detail-title" id="detailTitle">Place</div>
          <div class="detail-sub" id="detailSub" hidden></div>
        </div>
        <button class="detail-close" id="detailCloseBtn" type="button" aria-label="Close place details">✕</button>
      </div>
      <div class="detail-pill-row" id="detailPillRow"></div>
      <div class="detail-list" id="detailList"></div>
    </div>
<div class="list-sheet glass" id="listSheet">
      <button class="result-bar" id="resultBar" aria-expanded="false">
        <div class="result-copy">
          <div class="result-title" id="resultTitle">Explore nearby</div>
          <div class="result-sub" id="resultSub">Choose a category</div>
        </div>
        <div class="chev">⌃</div>
      </button>
      <div class="results-panel" id="resultsPanel" hidden><div class="results-list" id="resultsList"></div></div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const categories = [
      { id: "park", label: "Parks", desc: "Parks and green spaces", tags: ["leisure=park", "landuse=recreation_ground"] },
      { id: "coffee", label: "Coffee", desc: "Cafes and coffee shops", tags: ["amenity=cafe", "shop=coffee"] },
      { id: "restaurant", label: "Restaurants", desc: "Sit-down food nearby", tags: ["amenity=restaurant"] },
      { id: "pharmacy", label: "Drug stores", desc: "Pharmacies and drug stores", tags: ["amenity=pharmacy"] },
      { id: "bakery", label: "Bakeries", desc: "Bread, pastries, sweets", tags: ["shop=bakery"] },
      { id: "grocery", label: "Groceries", desc: "Markets and grocery stores", tags: ["shop=supermarket", "shop=convenience", "shop=grocery"] },
      { id: "playground", label: "Playgrounds", desc: "Play areas and kid spots", tags: ["leisure=playground"] },
      { id: "gym", label: "Gyms", desc: "Fitness and training", tags: ["leisure=fitness_centre", "sport=fitness"] }
    ];
    const quickCategoryIds = ["park", "coffee", "restaurant", "pharmacy"];
    const defaultCenter = [40.876, -73.910];
    const defaultZoom = 14;
    const searchRadiusMeters = 1300;

    const chipRail = document.getElementById("chipRail");
    const categoryGrid = document.getElementById("categoryGrid");
    const moreSheet = document.getElementById("moreSheet");
    const closeSheetBtn = document.getElementById("closeSheetBtn");
    const scrim = document.getElementById("scrim");
    const searchAreaBtn = document.getElementById("searchAreaBtn");
    const listSheet = document.getElementById("listSheet");
    const resultBar = document.getElementById("resultBar");
    const resultTitle = document.getElementById("resultTitle");
    const resultSub = document.getElementById("resultSub");
    const resultsList = document.getElementById("resultsList");
    const resultsPanel = document.getElementById("resultsPanel");
    const locateBtn = document.getElementById("locateBtn");
    const placeDetailSheet = document.getElementById("placeDetailSheet");
    const detailCloseBtn = document.getElementById("detailCloseBtn");
    const detailTitle = document.getElementById("detailTitle");
    const detailSub = document.getElementById("detailSub");
    const detailPillRow = document.getElementById("detailPillRow");
    const detailList = document.getElementById("detailList");

    let selectedCategory = null;
    let userMarker = null;
    let userLatLng = null;
    let isResultsExpanded = false;
    let suppressResultBarUntil = 0;
    let suppressMoveNotice = true;
    let activeFetchController = null;
    let currentPlaces = [];
    let activePlaceId = null;

    const map = L.map("map", { zoomControl:false, preferCanvas:true }).setView(defaultCenter, defaultZoom);
    L.control.zoom({ position:"bottomright" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19,
      attribution:"&copy; OpenStreetMap contributors"
    }).addTo(map);
    const resultLayer = L.layerGroup().addTo(map);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>\"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }
    function createChip(label, id, extraClass = "") {
      const btn = document.createElement("button");
      btn.className = `chip ${extraClass}`.trim();
      btn.textContent = label;
      btn.dataset.id = id;
      return btn;
    }
    function renderChips() {
      chipRail.innerHTML = "";
      quickCategoryIds.forEach(id => {
        const cat = categories.find(c => c.id === id);
        if (!cat) return;
        const chip = createChip(cat.label, cat.id);
        chip.addEventListener("click", () => { setSelectedCategory(cat.id, true); closeMoreSheet(); });
        chipRail.appendChild(chip);
      });
      const moreChip = createChip("More", "more", "ghost");
      moreChip.addEventListener("click", openMoreSheet);
      chipRail.appendChild(moreChip);
      updateSelectionUI();
    }
    function renderMoreSheet() {
      categoryGrid.innerHTML = "";
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "sheet-button";
        btn.dataset.id = cat.id;
        btn.innerHTML = `<div class="name">${escapeHtml(cat.label)}</div><div class="desc">${escapeHtml(cat.desc)}</div>`;
        btn.addEventListener("click", () => { setSelectedCategory(cat.id, true); closeMoreSheet(); });
        categoryGrid.appendChild(btn);
      });
      updateSelectionUI();
    }
    function updateSelectionUI() {
      document.querySelectorAll(".chip").forEach(el => el.classList.toggle("active", el.dataset.id === selectedCategory));
      document.querySelectorAll(".sheet-button").forEach(el => el.classList.toggle("active", el.dataset.id === selectedCategory));
    }
    function openMoreSheet() {
      moreSheet.classList.add("show");
      moreSheet.setAttribute("aria-hidden", "false");
      scrim.classList.add("show");
    }
    function closeMoreSheet() {
      moreSheet.classList.remove("show");
      moreSheet.setAttribute("aria-hidden", "true");
      scrim.classList.remove("show");
    }
    closeSheetBtn.addEventListener("click", closeMoreSheet);
    scrim.addEventListener("click", closeMoreSheet);
    detailCloseBtn.addEventListener("click", closePlaceDetails);

    function compactAddress(tags) {
      if (!tags) return "";
      const parts = [
        tags["addr:housenumber"],
        tags["addr:street"],
        tags["addr:city"] || tags["addr:town"] || tags["addr:village"],
        tags["addr:state"],
        tags["addr:postcode"]
      ].filter(Boolean);
      return parts.join(parts.length > 2 ? ", " : " ").replace(/\s+,/g, ',').trim();
    }
    function closePlaceDetails() {
      activePlaceId = null;
      placeDetailSheet.classList.remove("show");
      placeDetailSheet.setAttribute("aria-hidden", "true");
      detailTitle.textContent = "Place";
      detailSub.hidden = true;
      detailSub.textContent = "";
      detailPillRow.innerHTML = "";
      detailList.innerHTML = "";
    }
    function openPlaceDetails(place) {
      if (!place) return;
      activePlaceId = place.id || null;
      detailTitle.textContent = place.name || "Unnamed place";

      const subParts = [place.typeLabel, place.distanceText].filter(Boolean);
      if (subParts.length) {
        detailSub.hidden = false;
        detailSub.textContent = subParts.join(" · ");
      } else {
        detailSub.hidden = true;
        detailSub.textContent = "";
      }

      detailPillRow.innerHTML = "";
      const pills = [];
      if (place.typeLabel) pills.push(place.typeLabel);
      if (place.cuisine) pills.push(place.cuisine);
      pills.slice(0, 3).forEach(value => {
        const pill = document.createElement("div");
        pill.className = "detail-pill";
        pill.textContent = value;
        detailPillRow.appendChild(pill);
      });

      detailList.innerHTML = "";
      const items = [];
      if (place.address) items.push({ icon: "📍", value: place.address });
      if (place.openingHours) items.push({ icon: "🕒", value: place.openingHours });
      if (place.phone) items.push({ icon: "☎", value: place.phone });
      if (place.website) {
        const safeUrl = /^https?:\/\//i.test(place.website) ? place.website : `https://${place.website}`;
        items.push({ icon: "↗", value: `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(place.website)}</a>`, html: true });
      }

      items.forEach(item => {
        const row = document.createElement("div");
        row.className = "detail-item";
        const icon = document.createElement("div");
        icon.className = "detail-icon";
        icon.textContent = item.icon;
        const copy = document.createElement("div");
        copy.className = "detail-text";
        if (item.html) copy.innerHTML = item.value;
        else copy.textContent = item.value;
        row.appendChild(icon);
        row.appendChild(copy);
        detailList.appendChild(row);
      });

      placeDetailSheet.classList.add("show");
      placeDetailSheet.setAttribute("aria-hidden", "false");
    }

    function formatDistanceMeters(meters) {
      if (meters == null || Number.isNaN(meters)) return "";
      if (meters < 1000) return `${Math.round(meters)} m away`;
      const km = meters / 1000;
      return `${km.toFixed(km < 10 ? 1 : 0)} km away`;
    }
    function getDistanceMeters(a, b) {
      const R = 6371000;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const s = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }
    function titleCase(value) {
      return (value || "").split(/[_\s]+/).filter(Boolean).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
    }
    function getCategoryById(id) {
      return categories.find(c => c.id === id) || null;
    }
    function setSelectedCategory(categoryId, runSearch = false) {
      suppressResultBarUntil = Date.now() + 700;
      setResultsExpanded(false);
      requestAnimationFrame(() => setResultsExpanded(false));
      selectedCategory = categoryId;
      updateSelectionUI();
      const category = getCategoryById(selectedCategory);
      resultTitle.textContent = category ? `${category.label} nearby` : "No category selected";
      resultSub.textContent = category ? "Results in current map area" : "List stays tucked away until you open it.";
      if (runSearch && category) fetchPlacesForVisibleArea(category);
    }
    function setSearchAreaVisible(show) { searchAreaBtn.classList.toggle("show", show); }
    function setResultsExpanded(expanded) {
      isResultsExpanded = expanded;
      if (expanded) closePlaceDetails();
      listSheet.classList.toggle("expanded", expanded);
      resultBar.setAttribute("aria-expanded", String(expanded));
      if (resultsPanel) resultsPanel.hidden = !expanded;
    }
    resultBar.addEventListener("click", (event) => {
      if (!selectedCategory) return;
      if (Date.now() < suppressResultBarUntil) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      setResultsExpanded(!isResultsExpanded);
    });
    function makePopupHtml(place) {
      const lines = [];
      if (place.typeLabel) lines.push(place.typeLabel);
      if (place.distanceText) lines.push(place.distanceText);
      return `<div class="popup-name">${escapeHtml(place.name || "Unnamed place")}</div><div class="popup-meta">${escapeHtml(lines.join(" · ") || "Nearby place")}</div>`;
    }
    function updateResultCards(places) {
      resultsList.innerHTML = "";
      if (!places.length) return;

      places.forEach((place) => {
        const rowLink = document.createElement("button");
        rowLink.className = "result-row";
        rowLink.type = "button";
        rowLink.setAttribute("aria-label", `Open ${place.name || "place"} on map`);
        rowLink.addEventListener("click", () => {
          focusPlace(place.id, true);
        });

        const main = document.createElement("div");
        main.className = "result-main";

        const name = document.createElement("div");
        name.className = "result-name";
        name.textContent = place.name || "Unnamed place";

        const meta = document.createElement("div");
        meta.className = "result-meta";
        const metaParts = [place.typeLabel, place.distanceText].filter(Boolean);
        meta.textContent = metaParts.join(" · ") || "Nearby place";

        const affordance = document.createElement("div");
        affordance.className = "result-affordance";
        affordance.setAttribute("aria-hidden", "true");
        affordance.textContent = "›";

        main.appendChild(name);
        main.appendChild(meta);
        rowLink.appendChild(main);
        rowLink.appendChild(affordance);
        resultsList.appendChild(rowLink);
      });
    }
    function focusPlace(placeId, collapseList = true) {
      const place = currentPlaces.find(p => p.id === placeId);
      if (!place) return;
      suppressMoveNotice = true;
      if (collapseList) {
        suppressResultBarUntil = Date.now() + 350;
        setResultsExpanded(false);
      }
      map.flyTo([place.lat, place.lng], Math.max(map.getZoom(), 17), { duration: 0.45 });
      openPlaceDetails(place);
    }
    function clearResults() {
      currentPlaces = [];
      closePlaceDetails();
      resultLayer.clearLayers();
      updateResultCards([]);
    }
    function getVisibleCenterLatLng() {
      const center = map.getCenter();
      return { lat: center.lat, lng: center.lng };
    }
    function buildOverpassQuery(category, center) {
      const tagQueries = category.tags.map(tag => {
        const [key, value] = tag.split('=');
        return `nwr(around:${searchRadiusMeters},${center.lat},${center.lng})["${key}"="${value}"];`;
      }).join('');
      return `[out:json][timeout:25];(${tagQueries});out center tags;`;
    }
    function normalizeElements(elements, center) {
      const dedupe = new Set();
      return elements.map(el => {
        const lat = el.lat ?? el.center?.lat;
        const lng = el.lon ?? el.center?.lon;
        if (lat == null || lng == null) return null;
        const id = `${el.type}-${el.id}`;
        if (dedupe.has(id)) return null;
        dedupe.add(id);
        const tags = el.tags || {};
        const typeLabel = titleCase(tags.amenity || tags.shop || tags.leisure || tags.landuse || tags.sport || 'place');
        const distanceMeters = getDistanceMeters(center, { lat, lng });
        const website = tags.website || tags['contact:website'] || '';
        const phone = tags.phone || tags['contact:phone'] || tags['contact:mobile'] || '';
        const cuisine = tags.cuisine ? tags.cuisine.split(';').map(part => titleCase(part.trim())).filter(Boolean).join(' · ') : '';
        const address = compactAddress(tags);
        return {
          id,
          name: tags.name || tags.brand || tags.operator || 'Unnamed place',
          lat, lng,
          typeLabel,
          distanceMeters,
          distanceText: formatDistanceMeters(distanceMeters),
          mapUrl: `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=18/${lat}/${lng}`,
          address,
          openingHours: tags.opening_hours || '',
          phone,
          website,
          cuisine,
          tags
        };
      }).filter(Boolean).sort((a, b) => a.distanceMeters - b.distanceMeters).slice(0, 24);
    }
    async function fetchPlacesForVisibleArea(category) {
      const center = getVisibleCenterLatLng();
      closePlaceDetails();
      setSearchAreaVisible(false);
      suppressResultBarUntil = Date.now() + 700;
      setResultsExpanded(false);
      requestAnimationFrame(() => setResultsExpanded(false));
      resultTitle.textContent = `${category.label} nearby`;
      resultSub.textContent = 'Searching current map area…';
      if (activeFetchController) activeFetchController.abort();
      activeFetchController = new AbortController();
      try {
        const query = buildOverpassQuery(category, center);
        const response = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          body: query,
          signal: activeFetchController.signal,
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const places = normalizeElements(data.elements || [], center);
        resultLayer.clearLayers();
        places.forEach(place => {
          const marker = L.circleMarker([place.lat, place.lng], {
            radius: 7,
            weight: 2,
            color: '#d9efff',
            fillColor: '#57abff',
            fillOpacity: 0.88
          }).addTo(resultLayer);
          marker.on('click', () => {
            openPlaceDetails(place);
          });
          place.marker = marker;
        });
        currentPlaces = places;
        updateResultCards(places);
        suppressResultBarUntil = Date.now() + 450;
        setResultsExpanded(false);
        setTimeout(() => setResultsExpanded(false), 0);
        resultSub.textContent = places.length ? `${places.length} place${places.length === 1 ? '' : 's'} found` : 'No places found in this area';
      } catch (error) {
        if (error.name === 'AbortError') return;
        currentPlaces = [];
        resultLayer.clearLayers();
        resultsList.innerHTML = `<div class="result-row" role="status" aria-live="polite"><div class="result-main"><div class="result-name">Could not load places</div><div class="result-meta">The places service did not respond. Try again in a moment.</div></div></div>`;
        resultSub.textContent = 'Search failed';
      }
    }

    map.on('click', (event) => {
      if (!event.originalEvent?.target?.closest?.('.leaflet-interactive')) {
        closePlaceDetails();
      }
    });

    function positionSearchAreaButton() {
      const topUi = document.querySelector(".top-ui");
      if (!topUi) return;
      const top = topUi.offsetTop + topUi.offsetHeight + 10;
      searchAreaBtn.style.top = `${top}px`;
    }
    searchAreaBtn.addEventListener('click', () => {
      const category = getCategoryById(selectedCategory);
      if (category) fetchPlacesForVisibleArea(category);
    });
    map.on('movestart', () => {
      if (suppressMoveNotice) return;
      if (selectedCategory) setSearchAreaVisible(true);
    });
    map.on('moveend', () => {
      suppressMoveNotice = false;
    });
    function updateUserMarker(lat, lng) {
      userLatLng = { lat, lng };
      if (!userMarker) {
        userMarker = L.circleMarker([lat, lng], {
          radius: 9,
          weight: 3,
          color: '#ffffff',
          fillColor: '#ff4d67',
          fillOpacity: 1
        }).addTo(map).bindPopup('<div class="popup-name">You are here</div><div class="popup-meta">Current device location</div>');
      } else {
        userMarker.setLatLng([lat, lng]);
      }
    }
    function requestUserLocation({ recenter = false, initial = false } = {}) {
      if (!navigator.geolocation) return;
      const options = initial
        ? { enableHighAccuracy: false, timeout: 4000, maximumAge: 300000 }
        : { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 };

      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          const hadLocation = !!userLatLng;
          updateUserMarker(latitude, longitude);
          if (recenter || !hadLocation) {
            map.flyTo([latitude, longitude], 15, { duration: hadLocation ? 0.5 : 0.35 });
          }
        },
        () => {},
        options
      );
    }

    locateBtn.addEventListener('click', () => {
      if (userLatLng) {
        map.flyTo([userLatLng.lat, userLatLng.lng], 15, { duration: 0.4 });
        if (userMarker) userMarker.openPopup();
        return;
      }
      requestUserLocation({ recenter: true });
    });

    renderChips();
    renderMoreSheet();
    positionSearchAreaButton();
    window.addEventListener('resize', positionSearchAreaButton);
    clearResults();
    setResultsExpanded(false);
    requestUserLocation({ recenter: true, initial: true });
  </script>
</body>
</html>
