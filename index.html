<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Local Explorer — Compact Chip Update</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="app">
    <div id="map" aria-label="Map"></div>
    <div class="top-ui">
      <div class="top-utility-row">
        <button class="icon-btn locate-only" id="locateBtn" aria-label="Go to my location" title="Go to my location">
          <span class="locate-glyph" aria-hidden="true"></span>
        </button>
      </div>
      <div class="context-bar glass" id="contextBar">
        <div class="context-copy">
          <div class="context-eyebrow" id="contextEyebrow">Local Explorer</div>
          <div class="context-title" id="contextTitle">Explore nearby</div>
          <div class="context-sub" id="contextSub">Choose a category to see what is nearby.</div>
        </div>
      </div>
      <div class="category-strip glass">
        <div class="chip-rail" id="chipRail" aria-label="Quick categories"></div>
      </div>
      <button class="search-state-btn" id="searchActionBtn" type="button" aria-live="polite">
        <span class="search-state-icon" aria-hidden="true"></span>
        <span class="search-state-copy">
          <span class="search-state-title" id="searchActionTitle">Choose a category</span>
          <span class="search-state-sub" id="searchActionSub">Pick what you want to find nearby.</span>
        </span>
        <span class="search-state-meta" id="searchActionMeta">Browse</span>
      </button>
    </div>

    <div class="discovery-sheet glass" id="discoverySheet">
      <button class="result-bar" id="resultBar" aria-expanded="false" type="button">
        <div class="result-copy">
          <div class="result-title" id="resultTitle">Explore nearby</div>
          <div class="result-sub" id="resultSub">Choose a category to begin</div>
        </div>
        <div class="chev">⌃</div>
      </button>
      <div class="sheet-panel" id="resultsPanel" hidden>
        <div class="results-view" id="resultsView">
          <div class="results-list" id="resultsList"></div>
        </div>
        <div class="detail-view" id="detailView" hidden>
          <div class="detail-toolbar">
            <button class="detail-back" id="detailBackBtn" type="button">Nearby results</button>
            <button class="detail-close" id="detailCloseBtn" type="button" aria-label="Close place details">✕</button>
          </div>
          <div class="detail-sheet-copy">
            <div class="detail-eyebrow">Place details</div>
            <div class="detail-title" id="detailTitle">Place</div>
            <div class="detail-sub" id="detailSub" hidden></div>
          </div>
          <div class="detail-pill-row" id="detailPillRow"></div>
          <div class="detail-list" id="detailList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
